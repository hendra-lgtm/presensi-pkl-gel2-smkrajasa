<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMK RAJASA - Presensi PKL Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .bg-gradient-blue { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); }
        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
        }
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        #photoPreview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        .shutter-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            padding: 5px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: none;
        }
        .shutter-btn div {
            width: 100%;
            height: 100%;
            background: #ef4444;
            border-radius: 50%;
            transition: transform 0.1s;
        }
        .shutter-btn:active div { transform: scale(0.9); }
        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.9);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- HALAMAN LOGIN -->
    <div id="loginPage" class="flex flex-col items-center justify-center min-h-screen p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-lg p-8 flex flex-col items-center text-center">
            <div class="mb-6">
                <img src="https://lh3.googleusercontent.com/d/1Z7MdnGKOzKeb2I_Zr9Ej5Ldi7RxPauKn" 
                     alt="Logo SMK RAJASA" 
                     class="w-24 h-24 object-contain"
                     onerror="this.onerror=null; this.src='https://cdn-icons-png.flaticon.com/512/2602/2602414.png';">
            </div>

            <h1 class="text-2xl font-bold text-gray-800">SMK RAJASA</h1>
            <p class="text-gray-500 text-sm mb-8 font-medium">Sistem Presensi PKL Digital</p>

            <div class="w-full text-left">
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 block">Identitas Siswa</label>
                <div class="relative mb-2">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-blue-500">
                        <i class="fa-solid fa-address-card"></i>
                    </span>
                    <input type="number" id="loginNisn" placeholder="Masukkan NISN..." 
                           class="w-full pl-12 pr-4 py-4 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none text-gray-700 transition-all">
                </div>
                <p class="text-[10px] text-gray-400 text-center mb-6">Pastikan NISN sesuai data sekolah</p>
            </div>

            <button onclick="handleLogin()" 
                    class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 flex items-center justify-center gap-2 hover:bg-blue-700 active:scale-95 transition-all">
                Masuk Aplikasi <i class="fa-solid fa-arrow-right"></i>
            </button>

            <p class="text-[10px] text-gray-300 mt-8 tracking-widest uppercase">SMK RAJASA Surabaya</p>
        </div>
    </div>

    <!-- HALAMAN FORMULIR -->
    <div id="mainPage" class="hidden flex flex-col min-h-screen max-w-md mx-auto bg-white shadow-2xl relative">
        <div class="bg-gradient-blue p-5 flex items-center justify-between text-white rounded-b-3xl shadow-lg">
            <button onclick="handleLogout()" class="bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-lg text-[10px] font-bold flex items-center gap-1 transition-all">
                <i class="fa-solid fa-arrow-left"></i> KELUAR
            </button>
            <div class="text-center">
                <h2 class="font-bold text-sm tracking-wide">SMK RAJASA</h2>
                <p class="text-[10px] opacity-80 uppercase font-medium">Formulir Absensi</p>
            </div>
            <div class="w-10 flex justify-end">
                <img src="https://lh3.googleusercontent.com/d/1Z7MdnGKOzKeb2I_Zr9Ej5Ldi7RxPauKn" 
                     alt="Logo" class="w-8 h-8 object-contain brightness-110">
            </div>
        </div>

        <div class="p-5 space-y-6 overflow-y-auto flex-grow pb-10">
            
            <!-- Detail Data -->
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 block">Nama Lengkap</label>
                    <div class="relative">
                        <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-blue-300"></i>
                        <input type="text" id="nama" readonly 
                               class="w-full pl-10 pr-4 py-3.5 rounded-xl border border-gray-100 bg-gray-50 text-xs font-bold outline-none text-gray-700">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 block">Kelas</label>
                        <input type="text" id="kelas" readonly 
                               class="w-full px-4 py-3.5 rounded-xl border border-gray-100 bg-gray-50 text-xs font-bold outline-none text-gray-700">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 block">NISN</label>
                        <input type="number" id="nisn" readonly 
                               class="w-full px-4 py-3.5 rounded-xl border border-gray-100 bg-gray-50 text-xs font-bold outline-none text-gray-700">
                    </div>
                </div>
            </div>

            <!-- Lokasi GPS -->
            <div class="border border-blue-100 rounded-2xl p-4 bg-blue-50/30">
                <div class="flex justify-between items-center mb-2">
                    <div class="flex items-center gap-2 text-blue-800 text-[10px] font-black uppercase">
                        <i class="fa-solid fa-location-dot text-blue-500"></i> Koordinat Lokasi
                    </div>
                    <button onclick="getLocation()" class="text-blue-600 text-[10px] font-bold hover:underline">Update GPS</button>
                </div>
                <div class="bg-white border border-blue-50 rounded-xl p-3 text-center shadow-sm">
                    <p id="locationText" class="text-xs text-gray-400 italic">Mencari koordinat...</p>
                </div>
            </div>

            <!-- Kamera Selfie -->
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 block">Verifikasi Foto (Selfie)</label>
                <div class="video-container shadow-2xl">
                    <p class="absolute top-4 right-4 text-[9px] text-white/50 z-10 font-mono bg-black/20 px-2 py-0.5 rounded">Mode: Kamera</p>
                    <video id="video" autoplay playsinline></video>
                    <img id="photoPreview">
                    <button type="button" id="shutter" class="shutter-btn" onclick="takePhoto()">
                        <div></div>
                    </button>
                    <button id="retakeBtn" onclick="retakePhoto()" 
                            class="hidden absolute bottom-6 right-6 bg-red-600 text-white px-4 py-2 rounded-full text-[10px] font-black shadow-xl flex items-center gap-2">
                        <i class="fa-solid fa-rotate-left"></i> GANTI FOTO
                    </button>
                </div>
            </div>

            <!-- Tombol Status (Pindah ke bawah) -->
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 block text-center">Pilih Status Kehadiran</label>
                <div class="flex p-1.5 bg-gray-100 rounded-2xl gap-1 mb-4">
                    <button type="button" id="btnMasuk" onclick="setStatus('Masuk')" 
                            class="flex-1 py-4 rounded-xl text-xs font-bold flex items-center justify-center gap-2 transition-all bg-blue-600 text-white shadow-md">
                        <i class="fa-solid fa-right-to-bracket"></i> Masuk
                    </button>
                    <button type="button" id="btnPulang" onclick="setStatus('Pulang')" 
                            class="flex-1 py-4 rounded-xl text-xs font-bold flex items-center justify-center gap-2 transition-all text-gray-500">
                        <i class="fa-solid fa-right-from-bracket"></i> Pulang
                    </button>
                </div>

                <button id="submitBtn" onclick="sendData()" disabled
                        class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-sm tracking-widest flex items-center justify-center gap-3 shadow-xl active:scale-95 transition-all">
                    <i class="fa-solid fa-cloud-arrow-up"></i> KIRIM ABSENSI
                </button>
            </div>

            <!-- Riwayat Absensi -->
            <div class="mt-8 border-t border-gray-100 pt-6">
                <div class="flex items-center gap-2 mb-4 text-gray-800">
                    <i class="fa-solid fa-clock-rotate-left text-blue-600"></i>
                    <h3 class="font-bold text-sm uppercase tracking-wide">Riwayat Absensi Anda</h3>
                </div>
                <div id="historyList" class="space-y-3">
                    <div class="text-center py-6 border-2 border-dashed border-gray-100 rounded-2xl">
                        <p class="text-xs text-gray-300">Belum ada riwayat hari ini</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <canvas id="canvas" class="hidden"></canvas>

        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>

        const video = document.getElementById('video');
        const photoPreview = document.getElementById('photoPreview');
        const canvas = document.getElementById('canvas');
        const shutter = document.getElementById('shutter');
        const retakeBtn = document.getElementById('retakeBtn');
        const submitBtn = document.getElementById('submitBtn');
        const locationText = document.getElementById('locationText');
        const loading = document.getElementById('loading');
        const historyList = document.getElementById('historyList');

        let currentStatus = "Masuk";
        let capturedImage = null;
        let coords = { lat: 0, lng: 0 };

        function handleLogin() {
            const inputNisn = document.getElementById('loginNisn').value;
            const siswa = SISWA_DATABASE.find(s => s.nisn === inputNisn);

            if (siswa) {
                document.getElementById('nisn').value = siswa.nisn;
                document.getElementById('nama').value = siswa.nama;
                document.getElementById('kelas').value = siswa.kelas;
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('mainPage').classList.remove('hidden');
                startCamera();
                getLocation();
                loadHistory(siswa.nisn);
            } else {
                alert("NISN tidak ditemukan!");
            }
        }

        function handleLogout() {
            if(confirm("Apakah Anda ingin keluar?")) window.location.reload();
        }

        function setStatus(status) {
            currentStatus = status;
            const btnM = document.getElementById('btnMasuk');
            const btnP = document.getElementById('btnPulang');
            if(status === 'Masuk') {
                btnM.className = "flex-1 py-4 rounded-xl text-xs font-bold flex items-center justify-center gap-2 bg-blue-600 text-white shadow-md transition-all";
                btnP.className = "flex-1 py-4 rounded-xl text-xs font-bold flex items-center justify-center gap-2 text-gray-500 transition-all";
            } else {
                btnP.className = "flex-1 py-4 rounded-xl text-xs font-bold flex items-center justify-center gap-2 bg-blue-600 text-white shadow-md transition-all";
                btnM.className = "flex-1 py-4 rounded-xl text-xs font-bold flex items-center justify-center gap-2 text-gray-500 transition-all";
            }
            validateForm();
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                video.srcObject = stream;
            } catch (e) {
                alert("Izin kamera diperlukan.");
            }
        }

        function takePhoto() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0);
            capturedImage = canvas.toDataURL('image/jpeg', 0.8);
            photoPreview.src = capturedImage;
            video.classList.add('hidden');
            photoPreview.style.display = 'block';
            shutter.classList.add('hidden');
            retakeBtn.classList.remove('hidden');
            validateForm();
        }

        function retakePhoto() {
            capturedImage = null;
            video.classList.remove('hidden');
            photoPreview.style.display = 'none';
            shutter.classList.remove('hidden');
            retakeBtn.classList.add('hidden');
            validateForm();
        }

        function getLocation() {
            locationText.innerText = "Mendeteksi posisi...";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (p) => {
                        coords.lat = p.coords.latitude;
                        coords.lng = p.coords.longitude;
                        locationText.innerText = `Terdeteksi: ${coords.lat.toFixed(6)}, ${coords.lng.toFixed(6)}`;
                        locationText.className = "text-xs text-blue-600 font-bold";
                        validateForm();
                    },
                    (e) => { locationText.innerText = "Gagal memuat GPS."; }
                );
            }
        }

        function validateForm() {
            const isReady = capturedImage && coords.lat !== 0;
            if (isReady) {
                submitBtn.disabled = false;
                submitBtn.className = "w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-sm tracking-widest flex items-center justify-center gap-3 shadow-xl active:scale-95 transition-all";
            } else {
                submitBtn.disabled = true;
                submitBtn.className = "w-full bg-gray-200 text-gray-400 py-4 rounded-2xl font-black text-sm tracking-widest flex items-center justify-center gap-3 transition-all";
            }
        }

        function loadHistory(nisn) {
            const history = JSON.parse(localStorage.getItem('absensi_history_' + nisn) || '[]');
            if (history.length > 0) {
                // Menampilkan riwayat dengan detail tanggal dan jam
                historyList.innerHTML = history.reverse().slice(0, 5).map(item => `
                    <div class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl border border-gray-100">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 ${item.status === 'Masuk' ? 'bg-green-100 text-green-600' : 'bg-orange-100 text-orange-600'} rounded-full flex items-center justify-center text-xs">
                                <i class="fa-solid ${item.status === 'Masuk' ? 'fa-sign-in' : 'fa-sign-out'}"></i>
                            </div>
                            <div>
                                <p class="text-xs font-bold text-gray-800">Absen ${item.status}</p>
                                <div class="flex flex-col">
                                    <span class="text-[9px] text-gray-500 font-medium"><i class="fa-regular fa-calendar-check mr-1"></i> ${item.date}</span>
                                    <span class="text-[9px] text-blue-600 font-bold"><i class="fa-regular fa-clock mr-1"></i> ${item.time}</span>
                                </div>
                            </div>
                        </div>
                        <div class="text-[8px] font-mono text-gray-400 bg-white px-2 py-1 rounded-lg shadow-sm border border-gray-100">
                            TERSIMPAN
                        </div>
                    </div>
                `).join('');
            }
        }

        function saveToLocalHistory(data) {
            const nisn = data.nisn;
            const history = JSON.parse(localStorage.getItem('absensi_history_' + nisn) || '[]');
            const now = new Date();
            
            // Format Jam (HH:mm WIB)
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' + 
                            now.getMinutes().toString().padStart(2, '0') + ' WIB';
            
            // Format Tanggal (DD/MM/YYYY)
            const dateStr = now.getDate().toString().padStart(2, '0') + '/' + 
                            (now.getMonth() + 1).toString().padStart(2, '0') + '/' + 
                            now.getFullYear();
            
            history.push({
                status: data.status,
                time: timeStr,
                date: dateStr
            });
            
            localStorage.setItem('absensi_history_' + nisn, JSON.stringify(history));
        }

        async function sendData() {
            loading.style.display = "flex";
            const data = {
                nama: document.getElementById('nama').value,
                nisn: document.getElementById('nisn').value,
                kelas: document.getElementById('kelas').value,
                status: currentStatus,
                lat: coords.lat,
                lng: coords.lng,
                foto: capturedImage
            };
            try {
                await fetch(WEB_APP_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    cache: 'no-cache',
                    body: JSON.stringify(data) 
                });
                
                saveToLocalHistory(data);
                alert("Absensi " + currentStatus + " Berhasil!");
                window.location.reload();
            } catch (e) {
                alert("Gagal terhubung ke Server.");
            } finally {
                loading.style.display = "none";
            }
        }
